  <title>Lukas Guimarães</title>
  <style>
    /* Mobile styles */
    @media (max-width: 768px) {
      /* Hide desktop menu */
      .menu {
        position: fixed;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100vh;
        background: #fff;
        flex-direction: column;
        padding: 40px 20px;
        z-index: 1000;
        transition: left 0.3s ease;
        overflow-y: auto;
        align-items: flex-start;
      }

      .menu.active {
        left: 0;
      }

      .menu .brand {
        margin-bottom: 15px;
        font-size: 16px;
        color: #000;
        width: 100%;
      }

      .menu .links {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 100%;
      }

      .menu .links a {
        color: #000;
        margin-left: 0;
        font-size: 14px;
        text-transform: capitalize;
      }

      /* Mobile menu toggle button */
      .menu-toggle {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 40px;
        height: 40px;
        background: transparent;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0;
      }

      /* Gallery - full screen cards with gaps */
      .gallery {
        column-count: 1;
        padding: 0;
        display: flex;
        flex-direction: column;
        scroll-snap-type: y mandatory;
        gap: 15px;
      }

      .item-link {
        display: block;
        width: 100%;
        height: auto;
        scroll-snap-align: start;
      }

      .item-link::before {
        content: none;
      }

      .item {
        width: 100%;
        height: 100vh;
        position: relative;
        margin-bottom: 0;
        border-radius: 0;
      }

      .item-link:first-child .item {
        margin-top: 0;
      }

      .item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Title styling for mobile - inside photo */
      .item-title {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 28px;
        z-index: 2;
        color: white;
        font-weight: 600;
        text-transform: uppercase;
        text-align: center;
        width: calc(100% - 40px);
      }

      .item-subtitle {
        display: none;
      }

      .item::before {
        display: none;
      }

      .item:hover::before {
        display: none;
      }

      .item:hover .item-title {
        opacity: 1;
      }
    }
  </style></head>

  <script>
    // Mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    const menu = document.getElementById('menu');

    menuToggle.addEventListener('click', () => {
      menu.classList.toggle('active');
    });

    // Close menu when a link is clicked
    const menuLinks = menu.querySelectorAll('.links a');
    menuLinks.forEach(link => {
      link.addEventListener('click', () => {
        menu.classList.remove('active');
      });
    });
  </script>
